<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login PawsHome</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<nav class="navbar" id="navbar">
  <a href="home.html" class="brand">🐾 PawHome</a>
  <a href="home.html">Home</a>
  <a href="register.html">Register</a>
  <a href="login.html" class="active">Login</a>
  <a href="catalogue.html">Catalogue</a>
  <a href="shopping.html">Shopping</a>
  <a href="playtime.html">Playtime</a>
  <a href="pest.html">Pest Control</a>
  <a href="feedback.html">Feedback</a>
  <span class="welcome-msg hidden" id="welcome-msg"></span>
  <a href="dashboard.html" class="hidden" id="nav-dashboard">Dashboard</a>
  <a href="#" class="btn-logout hidden" id="btn-logout" onclick="logout()">Logout</a>
</nav>

<div class="form-page" style="display:flex;align-items:center;min-height:calc(100vh - 60px);">
  <div class="form-card" style="width:100%;">

    <div style="text-align:center;margin-bottom:1.5rem;">
      <div style="font-size:3.5rem;">P</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Login to continue your PawsHome journey</p>
    </div>

    <div id="form-alert" class="alert alert-error hidden"></div>
    <div id="form-success" class="alert alert-success hidden"></div>

    <form id="loginForm" novalidate>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email"/>
        <div class="field-error" id="err-email">Enter email</div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password"/>
          <button type="button" class="pw-toggle" onclick="togglePw('password')">Show</button>
        </div>
        <div class="field-error" id="err-password">Required</div>
      </div>

      <button type="submit" class="btn btn-primary btn-full mt-2">Login</button>

      <div style="text-align:center;margin-top:1rem;">
        No account <a href="register.html">Register</a>
      </div>

    </form>

    <!-- USER DASHBOARD -->
    <div id="userDashboard" class="hidden" style="margin-top:2rem;">
      <h2>Your Details</h2>

      <div class="table-wrap">
        <table>
          <tbody id="userDetails"></tbody>
        </table>
      </div>

      <h3>Your Activity</h3>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Details</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="userActivity"></tbody>
        </table>
      </div>

      <div style="margin-top:1rem;display:flex;gap:1rem;">
        <a href="shopping.html" class="btn btn-primary">Shopping</a>
        <a href="playtime.html" class="btn btn-primary">Playtime</a>
        <a href="pest.html" class="btn btn-primary">Pest Control</a>
      </div>
    </div>

  </div>
</div>

<script src="app.js"></script>

<script>

function togglePw(id){
  const inp=document.getElementById(id);
  inp.type=inp.type==='password'?'text':'password';
}

initNavbar();

['email','password'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    document.getElementById(id).classList.remove('error');
    document.getElementById('err-'+id).classList.remove('show');
  });
});

document.getElementById('loginForm').addEventListener('submit',async function(e){
  e.preventDefault();

  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const alert=document.getElementById('form-alert');

  alert.classList.add('hidden');
  document.getElementById('form-success').classList.add('hidden');

  let valid=true;

  if(!email){
    document.getElementById('err-email').classList.add('show');
    valid=false;
  }

  if(!password){
    document.getElementById('err-password').classList.add('show');
    valid=false;
  }

  if(!valid) return;

  const fd=new FormData();
  fd.append('action','login');
  fd.append('email',email);
  fd.append('password',password);

  try{
    const res=await fetch('api.php',{method:'POST',body:fd});
    const data=await res.json();

    if(data.success){
      localStorage.setItem('pawsUser',JSON.stringify(data.user));

      document.getElementById('form-success').textContent='Login success';
      document.getElementById('form-success').classList.remove('hidden');

      checkLoginStatus();
      loadUserDashboard();

    }else{
      alert.textContent=data.message||'Invalid login';
      alert.classList.remove('hidden');
    }

  }catch{
    alert.textContent='Network error';
    alert.classList.remove('hidden');
  }
});

// LOAD USER DATA
async function loadUserDashboard(){
  const user=JSON.parse(localStorage.getItem('pawsUser')||'null');
  if(!user) return;

  document.getElementById('userDashboard').classList.remove('hidden');

  document.getElementById('userDetails').innerHTML=`
    <tr><td>Name</td><td>${user.firstName} ${user.lastName}</td></tr>
    <tr><td>Email</td><td>${user.email}</td></tr>
    <tr><td>Address</td><td>${user.flatNo}, ${user.building}, ${user.city}</td></tr>
  `;

  try{
    const res=await fetch(`api.php?action=get_user_data&user_id=${user.id}`);
    const data=await res.json();

    let rows='';

    data.shopping.forEach(o=>{
      rows+=`<tr><td>Shopping</td><td>${o.pet_name}</td><td>${o.status}</td></tr>`;
    });

    data.playtime.forEach(p=>{
      rows+=`<tr><td>Playtime</td><td>${p.date} (${p.slot})</td><td>Booked</td></tr>`;
    });

    data.pest.forEach(p=>{
      rows+=`<tr><td>Pest</td><td>${p.pests}</td><td>${p.status}</td></tr>`;
    });

    document.getElementById('userActivity').innerHTML=rows || `<tr><td colspan="3">No activity yet</td></tr>`;

  }catch{
    document.getElementById('userActivity').innerHTML=`<tr><td colspan="3">Server not connected</td></tr>`;
  }
}

</script>

</body>
</html>
